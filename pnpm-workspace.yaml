catalogMode: prefer

# 是否忽略向工作区根目录添加依赖时的警告提示
ignoreWorkspaceRootCheck: true

registry: https://registry.npmmirror.com

# 是否强制提升所有依赖
shamefullyHoist: true

# 在执行脚本时使用POSIX shell模拟器替代系统原生shell
shellEmulator: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - semver@6.3.1
  - chokidar@4.0.3
  - cached-factory@0.1.0

# 用于控制是否严格检查对等依赖（peer dependencies）的版本一致性。
# 当设置为 true 时，pnpm 会强制安装指定版本的对等依赖；
# 设置为 false 时，会忽略版本不一致的警告
strictPeerDependencies: false

catalogs:
  dev:
    '@lincy/polyfill-useragent-normaliser': ^1.10.2
    '@lincy/unocss-base-config': ^2.6.2
    '@mrhenry/polyfill-library': ^5.2.1
    '@unocss/eslint-plugin': ^66.6.8
    '@vitejs/plugin-vue': ^6.0.6
    '@vitejs/plugin-vue-jsx': ^5.1.5
    '@vue-macros/define-props': ^3.1.2
    '@vue-macros/define-props-refs': ^3.1.2
    '@vue-macros/reactivity-transform': ^3.1.2
    '@vue-macros/volar': ^3.1.2
    baseline-browser-mapping: ^2.10.20
    cross-env: ^10.1.0
    jiti: ^2.6.1
    mockjs: ^1.1.0
    nitro: ^3.0.260415-beta
    sass-embedded: ^1.99.0
    typescript: ~5.9.3
    unocss: ^66.6.8
    unplugin-auto-import: ^21.0.0
    unplugin-icons: ^23.0.1
    unplugin-vue-components: ^32.0.0
    vite: ^8.0.9
    vite-plugin-inspect: ^12.0.0-beta.1
    vite-plugin-progress: ^0.0.7
    vue-macros: ^3.1.2
    vue-tsc: ^3.2.7

  icons:
    '@element-plus/icons-vue': ^2.3.2
    '@iconify-json/carbon': ^1.2.20
    '@iconify-json/fad': ^1.2.1
    '@iconify-json/svg-spinners': ^1.2.4
    '@iconify-json/vscode-icons': ^1.2.46

  lint:
    '@lincy/eslint-config': ^7.1.0
    '@lincy/stylelint-config': ^2.2.2
    eslint: ^10.2.1
    eslint-plugin-format: ^2.0.1
    stylelint: ^17.8.0

  prod:
    '@lincy/async-validation': ^1.4.0
    '@lincy/utils': ^0.7.3
    '@tanstack/vue-query': ^5.99.2
    '@tato30/vue-pdf': ^2.0.2
    '@unhead/vue': ^3.0.4
    '@unocss/reset': ^66.6.8
    '@vueuse/core': ^14.2.1
    '@vueuse/router': ^14.2.1
    alova: ^3.5.1
    better-sqlite3: ^12.9.0
    default-passive-events: ^4.0.0
    destr: ^2.0.5
    drizzle-orm: ^0.45.2
    element-plus: ^2.13.7
    highlight.js: ^11.11.1
    lodash: ^4.18.1
    markdown-it-link-attributes: ^4.0.1
    md-editor-v3: ^6.4.2
    mitt: ^3.0.1
    ofetch: ^1.5.1
    pinia: ^3.0.4
    qs: ^6.15.1
    store2: ^2.14.4
    twig: ^3.0.0
    vue: ^3.5.33
    vue-router: ^5.0.4

  types:
